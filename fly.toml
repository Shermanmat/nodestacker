# fly.toml app configuration file generated for nodestacker on 2026-02-17T17:26:28-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nodestacker'
primary_region = 'sjc'

[build]

[env]
  BASE_URL = 'https://matcap.vc'
  DATABASE_PATH = '/app/data/nodestacker.db'

[[mounts]]
  source = 'nodestacker_data'
  destination = '/app/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  # Health check on the fast /health route — the proxy only routes once the app
  # is actually listening, and deploys wait for it to pass before completing.
  [[http_service.checks]]
    interval = '15s'
    timeout = '3s'
    grace_period = '25s'
    method = 'GET'
    path = '/health'

# Roll, but wait for the new machine to pass health checks before cutting over.
[deploy]
  strategy = 'rolling'
  wait_timeout = '5m'

# Bigger VM: cold-importing googleapis + the full route tree thrashed on
# 512MB/shared-1x (~48s to bind). 2 shared CPUs + 1GB cuts cold-start sharply.
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 1024
