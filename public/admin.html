<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matcap - Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.js"></script>
  <style>
    [v-cloak] { display: none; }
    .sidebar-link { display: flex; align-items: center; padding: 6px 12px; border-radius: 6px; font-size: 13px; color: #94a3b8; cursor: pointer; transition: all 0.15s; }
    .sidebar-link:hover { background: rgba(255,255,255,0.06); color: #e2e8f0; }
    .sidebar-link.active { background: rgba(59,130,246,0.15); color: #60a5fa; font-weight: 500; }
    .sidebar-section { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #475569; padding: 16px 12px 4px; }
    .search-select { position: relative; }
    .search-select input { width: 100%; }
    .search-select .dropdown { position: absolute; left: 0; right: 0; top: 100%; z-index: 50; max-height: 200px; overflow-y: auto; background: white; border: 1px solid #d1d5db; border-top: none; border-radius: 0 0 6px 6px; box-shadow: 0 4px 6px -1px rgba(0,0,0,.1); }
    .search-select .dropdown-item { padding: 6px 12px; cursor: pointer; font-size: 13px; }
    .search-select .dropdown-item:hover, .search-select .dropdown-item.highlighted { background: #eff6ff; color: #1d4ed8; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="app" v-cloak>
    <!-- Login Screen -->
    <div v-if="!isAuthenticated" class="min-h-screen flex items-center justify-center">
      <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
        <h1 class="text-2xl font-bold text-gray-900 text-center mb-2">Matcap</h1>
        <p class="text-gray-500 text-center mb-6">Admin Dashboard</p>

        <div v-if="loginState === 'form'">
          <form @submit.prevent="requestMagicLink">
            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input
              type="email"
              v-model="loginEmail"
              placeholder="admin@example.com"
              class="w-full border rounded px-3 py-2 mb-4"
              required
            />
            <button
              type="submit"
              :disabled="loginLoading"
              class="w-full bg-blue-600 text-white rounded py-2 font-medium hover:bg-blue-700 disabled:opacity-50"
            >
              {{ loginLoading ? 'Sending...' : 'Send Magic Link' }}
            </button>
          </form>
        </div>

        <div v-else-if="loginState === 'sent'" class="text-center">
          <div class="text-green-600 text-4xl mb-4">✉️</div>
          <p class="text-gray-600">Check your email for a login link.</p>
          <button @click="loginState = 'form'" class="text-blue-600 text-sm mt-4 hover:underline">
            Try a different email
          </button>
        </div>

        <div v-else-if="loginState === 'verifying'" class="text-center">
          <div class="text-blue-600 text-4xl mb-4">⏳</div>
          <p class="text-gray-600">Verifying your login...</p>
        </div>

        <div v-else-if="loginState === 'error'" class="text-center">
          <div class="text-red-600 text-4xl mb-4">⚠️</div>
          <p class="text-red-600 mb-4">{{ loginError }}</p>
          <button @click="loginState = 'form'" class="text-blue-600 text-sm hover:underline">
            Try again
          </button>
        </div>
      </div>
    </div>

    <!-- Main App (shown when authenticated) -->
    <template v-else>
    <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-56 bg-slate-900 flex flex-col fixed inset-y-0 left-0 z-40 transition-transform md:translate-x-0" :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'">
      <!-- Logo -->
      <div class="px-4 py-4 flex items-center justify-between border-b border-slate-800">
        <span class="text-lg font-bold text-white tracking-tight">Matcap</span>
        <button @click="sidebarOpen = false" class="md:hidden text-slate-400 hover:text-white">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- Nav -->
      <nav class="flex-1 overflow-y-auto px-2 py-2">
        <div class="sidebar-section">Overview</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'dashboard' }" @click="switchTab('dashboard')">Dashboard</div>

        <div class="sidebar-section">People</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'founders' }" @click="switchTab('founders')">Founders</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'nodes' }" @click="switchTab('nodes')">Nodes</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'investors' }" @click="switchTab('investors')">Investors</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'discover' }" @click="switchTab('discover')">Discover Investors</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'signups' }" @click="switchTab('signups')">
          Signups
        </div>
        <div class="sidebar-link" :class="{ active: activeTab === 'directory' }" @click="switchTab('directory')">Directory</div>

        <div class="sidebar-section">Operations</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'intros' }" @click="switchTab('intros')">Intro Requests</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'inbound' }" @click="switchTab('inbound')">
          Inbound Logs
          <span v-if="pendingInboundCount > 0" class="ml-auto px-1.5 py-0.5 text-xs bg-red-500 text-white rounded-full leading-none">{{ pendingInboundCount }}</span>
        </div>
        <div class="sidebar-link" :class="{ active: activeTab === 'relationships' }" @click="switchTab('relationships')">Relationships</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'portfolio' }" @click="switchTab('portfolio')">Portfolio</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'broadcast' }" @click="switchTab('broadcast')">Broadcast</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'trials' }" @click="switchTab('trials')">Trials</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'onboarding' }" @click="switchTab('onboarding')">Onboarding</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'brands' }" @click="switchTab('brands')">Brands</div>

        <div class="sidebar-section">Analytics</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'leaderboard' }" @click="switchTab('leaderboard')">Founder Leaderboard</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'health' }" @click="switchTab('health')">Network Health</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'pipeline' }" @click="switchTab('pipeline')">Pipeline Health</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'marketplace' }" @click="switchTab('marketplace')">Marketplace Health</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'categories' }" @click="switchTab('categories')">Categories</div>
        <div class="sidebar-link" :class="{ active: activeTab === 'agent' }" @click="switchTab('agent')">
          AI Agent
          <span v-if="agentPendingCount > 0" class="ml-1 inline-flex items-center justify-center text-xs font-semibold bg-cyan-500 text-white rounded-full px-1.5">{{ agentPendingCount }}</span>
        </div>
      </nav>

      <!-- User -->
      <div class="px-4 py-3 border-t border-slate-800">
        <div class="text-xs text-slate-400 truncate mb-1">{{ adminEmail }}</div>
        <button @click="logout" class="text-xs text-red-400 hover:text-red-300">Logout</button>
      </div>
    </aside>

    <!-- Mobile header -->
    <div class="md:hidden fixed top-0 left-0 right-0 z-30 bg-white border-b px-4 py-3 flex items-center">
      <button @click="sidebarOpen = true" class="mr-3 text-gray-600">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="font-bold text-gray-900">Matcap</span>
    </div>

    <!-- Sidebar overlay (mobile) -->
    <div v-if="sidebarOpen" @click="sidebarOpen = false" class="md:hidden fixed inset-0 bg-black/50 z-30"></div>

    <!-- Main Content -->
    <main class="flex-1 md:ml-56 bg-gray-50 min-h-screen">
    <div class="max-w-7xl mx-auto px-6 py-6 md:py-6 mt-14 md:mt-0">
      <!-- Dashboard -->
      <div v-if="activeTab === 'dashboard'">
        <h2 class="text-xl font-semibold mb-4">Pipeline Overview</h2>

        <!-- Stats Cards -->
        <div class="grid grid-cols-4 gap-4 mb-6">
          <div class="bg-white rounded-lg shadow p-4">
            <div class="text-sm text-gray-500">Total Intro Requests</div>
            <div class="text-2xl font-bold">{{ stats.total || 0 }}</div>
          </div>
          <div class="bg-white rounded-lg shadow p-4">
            <div class="text-sm text-gray-500">Pending Node Response</div>
            <div class="text-2xl font-bold text-yellow-600">{{ stats.pendingNodeResponse || 0 }}</div>
          </div>
          <div class="bg-white rounded-lg shadow p-4">
            <div class="text-sm text-gray-500">Overdue Follow-ups</div>
            <div class="text-2xl font-bold text-red-600">{{ stats.overdueCount || 0 }}</div>
          </div>
          <div class="bg-white rounded-lg shadow p-4">
            <div class="text-sm text-gray-500">Invested</div>
            <div class="text-2xl font-bold text-green-600">{{ stats.byStatus?.invested || 0 }}</div>
          </div>
        </div>

        <!-- Trends Over Time -->
        <div v-if="trends.comparison" class="bg-white rounded-lg shadow p-4 mb-6">
          <h3 class="font-medium mb-3">Trends ({{ trends.currentMonth }} vs {{ trends.previousMonth }})</h3>
          <div class="grid grid-cols-5 gap-4">
            <div class="text-center p-3 rounded bg-gray-50">
              <div class="text-xs text-gray-500 mb-1">Requests</div>
              <div class="text-xl font-bold">{{ trends.comparison.intros?.current || 0 }}</div>
              <div class="text-xs" :class="trendClass(trends.comparison.intros?.direction)">
                {{ trendArrow(trends.comparison.intros?.direction) }} {{ Math.abs(trends.comparison.intros?.change || 0) }}
              </div>
            </div>
            <div class="text-center p-3 rounded bg-gray-50">
              <div class="text-xs text-gray-500 mb-1">Intros</div>
              <div class="text-xl font-bold">{{ trends.comparison.introduced?.current || 0 }}</div>
              <div class="text-xs" :class="trendClass(trends.comparison.introduced?.direction)">
                {{ trendArrow(trends.comparison.introduced?.direction) }} {{ Math.abs(trends.comparison.introduced?.change || 0) }}
              </div>
            </div>
            <div class="text-center p-3 rounded bg-gray-50">
              <div class="text-xs text-gray-500 mb-1">Accept Rate</div>
              <div class="text-xl font-bold">{{ trends.comparison.acceptRate?.current || 0 }}%</div>
              <div class="text-xs" :class="trendClass(trends.comparison.acceptRate?.direction)">
                {{ trendArrow(trends.comparison.acceptRate?.direction) }} {{ Math.abs(trends.comparison.acceptRate?.change || 0) }}%
              </div>
            </div>
            <div class="text-center p-3 rounded bg-gray-50">
              <div class="text-xs text-gray-500 mb-1">Invested</div>
              <div class="text-xl font-bold text-green-600">{{ trends.comparison.invested?.current || 0 }}</div>
              <div class="text-xs" :class="trendClass(trends.comparison.invested?.direction)">
                {{ trendArrow(trends.comparison.invested?.direction) }} {{ Math.abs(trends.comparison.invested?.change || 0) }}
              </div>
            </div>
            <div class="text-center p-3 rounded bg-gray-50">
              <div class="text-xs text-gray-500 mb-1">Ignored</div>
              <div class="text-xl font-bold text-gray-600">{{ trends.comparison.ignored?.current || 0 }}</div>
              <div class="text-xs" :class="trendClass(trends.comparison.ignored?.direction, true)">
                {{ trendArrow(trends.comparison.ignored?.direction, true) }} {{ Math.abs(trends.comparison.ignored?.change || 0) }}
              </div>
            </div>
          </div>
          <!-- Simple Chart -->
          <div v-if="trends.monthlyStats?.length > 1" class="mt-4 pt-4 border-t">
            <div class="flex items-center gap-2 mb-2 flex-wrap">
              <span class="text-xs text-gray-500">Show:</span>
              <button @click="chartMetric = 'requests'"
                :class="chartMetric === 'requests' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'"
                class="text-xs px-2 py-1 rounded">Requests</button>
              <button @click="chartMetric = 'intros'"
                :class="chartMetric === 'intros' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'"
                class="text-xs px-2 py-1 rounded">Intros</button>
              <button @click="chartMetric = 'acceptRate'"
                :class="chartMetric === 'acceptRate' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'"
                class="text-xs px-2 py-1 rounded">Accept Rate</button>
              <span class="text-xs text-gray-500 ml-2">Node:</span>
              <select v-model="chartNodeId" @change="loadTrends()" class="text-xs border rounded px-2 py-1">
                <option value="">All Nodes</option>
                <option v-for="n in nodes" :key="n.id" :value="n.id">{{ n.name }}</option>
              </select>
            </div>
            <div class="flex items-end gap-2 h-24">
              <div v-for="month in trends.monthlyStats" :key="month.month" class="flex-1 flex flex-col items-center">
                <div class="w-full bg-blue-100 rounded-t relative" :style="{ height: getBarHeight(getChartValue(month)) + 'px' }">
                  <div class="absolute -top-5 left-0 right-0 text-center text-xs font-medium">
                    {{ chartMetric === 'acceptRate' ? getChartValue(month) + '%' : getChartValue(month) }}
                  </div>
                </div>
                <div class="text-xs text-gray-400 mt-1">{{ getMonthShort(month.label) }}</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Investor MAU Chart -->
        <div v-if="investorMau.monthlyStats?.length > 1" class="bg-white rounded-lg shadow p-4 mb-6">
          <h3 class="font-medium mb-3">Monthly Active Investors</h3>
          <p class="text-xs text-gray-500 mb-3">Unique investors who replied per month (excludes ignored)</p>
          <div class="flex items-end gap-2 h-24">
            <div v-for="month in investorMau.monthlyStats" :key="month.month" class="flex-1 flex flex-col items-center">
              <div class="w-full bg-purple-100 rounded-t relative" :style="{ height: getMauBarHeight(month.uniqueInvestors) + 'px' }">
                <div class="absolute -top-5 left-0 right-0 text-center text-xs font-medium">
                  {{ month.uniqueInvestors }}
                </div>
              </div>
              <div class="text-xs text-gray-400 mt-1">{{ getMonthShort(month.label) }}</div>
            </div>
          </div>
        </div>

        <!-- Unique Firms That Took an Intro -->
        <div v-if="uniqueFirms.year" class="bg-white rounded-lg shadow p-4 mb-6">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-medium">Unique Firms That Took an Intro ({{ uniqueFirms[uniqueFirmsPeriod]?.count || 0 }})</h3>
            <div class="flex gap-1">
              <button @click="uniqueFirmsPeriod = 'month'"
                :class="uniqueFirmsPeriod === 'month' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'"
                class="text-xs px-2 py-1 rounded">{{ uniqueFirms.month?.label }}</button>
              <button @click="uniqueFirmsPeriod = 'quarter'"
                :class="uniqueFirmsPeriod === 'quarter' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'"
                class="text-xs px-2 py-1 rounded">{{ uniqueFirms.quarter?.label }}</button>
              <button @click="uniqueFirmsPeriod = 'year'"
                :class="uniqueFirmsPeriod === 'year' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'"
                class="text-xs px-2 py-1 rounded">{{ uniqueFirms.year?.label }}</button>
            </div>
          </div>
          <p class="text-sm text-gray-700 leading-relaxed">{{ (uniqueFirms[uniqueFirmsPeriod]?.firms || []).map(f => f.firm).join(', ') }}</p>
        </div>

        <!-- My Tasks (Node Tasks) - Grouped by Founder -->
        <div v-if="nodeTasks.length > 0" class="bg-white rounded-lg shadow p-4 mb-6">
          <h3 class="font-medium mb-3">My Follow-ups</h3>
          <div class="space-y-4">
            <div v-for="group in nodeTasks" :key="group.founder.id" class="border rounded-lg overflow-hidden">
              <!-- Founder Header -->
              <div class="bg-gray-100 px-4 py-2 flex justify-between items-center cursor-pointer"
                @click="toggleFounderTasks(group.founder.id)">
                <div>
                  <span class="font-medium">{{ group.founder.name }}</span>
                  <span class="text-gray-500 text-sm ml-2">{{ group.founder.companyName }}</span>
                </div>
                <div class="flex items-center gap-2">
                  <span v-if="group.highPriorityCount > 0" class="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded">
                    {{ group.highPriorityCount }} urgent
                  </span>
                  <span class="text-xs text-gray-500">{{ group.tasks.length }} task{{ group.tasks.length > 1 ? 's' : '' }}</span>
                  <span class="text-gray-400">{{ expandedFounderTasks[group.founder.id] ? '▼' : '▶' }}</span>
                </div>
              </div>
              <!-- Tasks for this founder -->
              <div v-if="expandedFounderTasks[group.founder.id]" class="divide-y">
                <div v-for="task in group.tasks" :key="task.intro.id"
                  class="flex items-center justify-between px-4 py-2"
                  :class="task.priority === 'high' ? 'bg-red-50' : task.priority === 'medium' ? 'bg-yellow-50' : 'bg-gray-50'">
                  <div class="flex-1">
                    <span class="text-sm">{{ task.intro.investor.name }} @ {{ task.intro.investor.firm }}</span>
                    <span class="text-xs ml-2 text-gray-500">{{ formatTaskType(task.type) }}</span>
                    <span v-if="task.intro.investorBumpCount > 0" class="text-xs ml-2 text-orange-600">
                      ({{ task.intro.investorBumpCount }} bump{{ task.intro.investorBumpCount > 1 ? 's' : '' }} sent)
                    </span>
                  </div>
                  <button v-if="task.type === 'bump_investor'" @click="bumpInvestor(task)" class="text-orange-600 hover:underline text-sm ml-4">
                    Bump
                  </button>
                  <button @click="goToIntro(task.intro)" class="text-blue-600 hover:underline text-sm ml-4">
                    Edit
                  </button>
                  <button @click="markNodeTaskDone(task)" class="text-green-600 hover:underline text-sm ml-2">
                    Done
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Pipeline by Status -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
          <h3 class="font-medium mb-3">Pipeline by Status</h3>
          <div class="grid grid-cols-3 gap-3">
            <div v-for="(count, status) in stats.byStatus" :key="status" class="flex justify-between py-2 px-3 bg-gray-50 rounded">
              <span class="text-sm">{{ formatStatus(status) }}</span>
              <span class="font-medium">{{ count }}</span>
            </div>
          </div>
        </div>

        <!-- Overdue Follow-ups -->
        <div class="bg-white rounded-lg shadow p-4">
          <h3 class="font-medium mb-3">Overdue Follow-ups</h3>
          <div v-if="overdueRequests.length === 0" class="text-gray-500 text-sm">No overdue follow-ups</div>
          <table v-else class="w-full text-sm">
            <thead>
              <tr class="text-left text-gray-500 border-b">
                <th class="py-2">Founder</th>
                <th>Node</th>
                <th>Investor</th>
                <th>Status</th>
                <th>Due Date</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="req in overdueRequests" :key="req.id" class="border-b hover:bg-gray-50">
                <td class="py-2">{{ req.founder?.name }}</td>
                <td>{{ req.node?.name }}</td>
                <td>{{ req.investor?.name }}</td>
                <td><span :class="statusClass(req.status)">{{ formatStatus(req.status) }}</span></td>
                <td class="text-red-600">{{ req.nextFollowupDate }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Portfolio Tab -->
      <div v-if="activeTab === 'portfolio'">
        <div class="flex justify-between items-center mb-4">
          <div class="flex items-center gap-4">
            <h2 class="text-xl font-semibold">Portfolio</h2>
            <div class="flex bg-gray-100 rounded-lg p-1">
              <button @click="portfolioView = 'admin'"
                :class="portfolioView === 'admin' ? 'bg-white shadow text-gray-900' : 'text-gray-500'"
                class="px-3 py-1 rounded text-sm font-medium">
                Admin
              </button>
              <button @click="portfolioView = 'share'"
                :class="portfolioView === 'share' ? 'bg-white shadow text-gray-900' : 'text-gray-500'"
                class="px-3 py-1 rounded text-sm font-medium">
                Share View
              </button>
            </div>
          </div>
          <div v-if="portfolioView === 'admin'" class="flex items-center gap-2">
            <button @click="exportPortfolioCsv" :disabled="!portfolio.companies?.length"
              class="border border-gray-300 text-gray-700 px-4 py-2 rounded-lg text-sm hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
              Export CSV
            </button>
            <button @click="showPortfolioModal = true" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">
              Add Company
            </button>
          </div>
        </div>

        <!-- Share View (Clean, screenshot-friendly) -->
        <div v-if="portfolioView === 'share'" class="bg-white rounded-lg shadow p-6">
          <h3 class="text-lg font-bold text-gray-900 mb-4">My Portfolio</h3>
          <div v-if="portfolio.companies?.length === 0" class="text-gray-500 text-center py-8">
            No portfolio companies yet.
          </div>
          <div v-else class="space-y-4">
            <div v-for="company in portfolio.companies" :key="company.id" class="border-b pb-4 last:border-b-0 last:pb-0">
              <div class="font-semibold text-gray-900">{{ company.founder?.companyName }}</div>
              <div v-if="company.oneLiner" class="text-gray-600 mt-1">{{ company.oneLiner }}</div>
              <div v-if="company.notes" class="text-sm text-gray-500 italic mt-1">{{ company.notes }}</div>
            </div>
          </div>
        </div>

        <!-- Admin View -->
        <template v-if="portfolioView === 'admin'">
          <!-- Portfolio Summary -->
          <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-lg shadow p-4">
              <div class="text-sm text-gray-500">Total Companies</div>
              <div class="text-2xl font-bold">{{ portfolio.summary?.totalCompanies || 0 }}</div>
            </div>
            <div class="bg-white rounded-lg shadow p-4">
              <div class="flex items-center justify-between mb-1">
                <div class="text-sm text-gray-500">Portfolio Value (Paper)</div>
                <div class="flex rounded overflow-hidden border border-gray-200 text-xs">
                  <button @click="portfolioValueBasis = 'agreement'" :class="portfolioValueBasis === 'agreement' ? 'bg-gray-800 text-white' : 'bg-white text-gray-500 hover:bg-gray-50'" class="px-2 py-0.5" title="All companies we have an agreement with (advisory signed)">Agreement</button>

                <option value="$25K-100K">$25K-100K</option>
                <option value="$100K-500K">$100K-500K</option>
                <option value="$500K-2M">$500K-2M</option>
                <option value="$2M-5M">$2M-5M</option>
                <option value="$5M+">$5M+</option>
              </select>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Geography</label>

            <div class="grid grid-cols-3 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">City</label>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">State <span class="text-gray-400 font-normal">(US)</span></label>

                  <option v-for="s in usStates" :key="s.code" :value="s.code">{{ s.code }} — {{ s.name }}</option>

                <p class="text-xs text-gray-500 mt-1">Auto-filled from city when known.</p>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Country</label>
                <select v-model="investorForm.country" class="w-full border rounded px-3 py-2">
                  <option value="">-</option>
                  <option v-for="c in countries" :key="c.code" :value="c.code">{{ c.name }}</option>
                </select>
              </div>
            </div>
            <div v-if="!editingInvestor">
              <label class="block text-sm font-medium text-gray-700 mb-1">Assign to Node *</label>
              <div class="search-select">
                <input type="text" v-model="ssInvestorNode" @focus="ssInvestorNodeOpen = true" @input="ssInvestorNodeOpen = true" @blur="ssInvestorNodeOpen = false" placeholder="Type to search nodes..." class="w-full border rounded px-3 py-2" :class="{ 'border-blue-500': investorForm.nodeId }">
                <div v-if="ssInvestorNodeOpen && ssInvestorNodeFiltered.length" class="dropdown">
                  <div v-for="n in ssInvestorNodeFiltered" :key="n.id" class="dropdown-item" @mousedown.prevent="selectInvestorNode(n)">{{ n.name }}</div>

              </div>

            </div>

                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Stage *</label>
                  <select v-model="investorForm.newStageId" required class="w-full border rounded px-3 py-2"
                    :class="{ 'border-red-300': !investorForm.newStageId }">
                    <option value="">— Select stage —</option>
                    <option v-for="c in stageCategoryOptions" :key="c.id" :value="c.id">{{ c.name }}</option>
                  </select>
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Founder persona *</label>
                  <select v-model="investorForm.newPersonaId" required class="w-full border rounded px-3 py-2"
                    :class="{ 'border-red-300': !investorForm.newPersonaId }">
                    <option value="">— Select persona —</option>
                    <option v-for="c in personaCategoryOptions" :key="c.id" :value="c.id">{{ c.name }}</option>
                  </select>
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Sector *</label>
                  <select v-model="investorForm.newSectorId" required class="w-full border rounded px-3 py-2"
                    :class="{ 'border-red-300': !investorForm.newSectorId }">
                    <option value="">— Select sector —</option>
                    <template v-for="group in sectorCategoryOptions" :key="group.parent.id">
                      <option :value="group.parent.id">{{ group.parent.name }}</option>
                      <option v-for="child in group.children" :key="child.id" :value="child.id">&nbsp;&nbsp;↳ {{ child.name }}</option>
                    </template>
                  </select>
                  <p class="text-xs text-gray-500 mt-1">Pick "Generalist" if this investor has no sector specialty</p>
                </div>
              </div>
            </div>
            <div v-if="editingInvestor" class="flex items-center gap-2">
              <input type="checkbox" v-model="investorForm.active" id="investor-active" class="rounded">
              <label for="investor-active" class="text-sm font-medium text-gray-700">Active</label>
              <span class="text-xs text-gray-500">(Inactive investors are hidden from planning)</span>
            </div>

            <div v-if="editingInvestor" class="border-t pt-4 space-y-3">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                <textarea v-model="investorForm.notes" rows="2" placeholder="Free-form notes — e.g. 'Doesn't take cold intros', 'Asks for revenue first', 'Only Tuesdays'" class="w-full border rounded px-3 py-2 text-sm"></textarea>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Won't take (category exclusions)</label>
                <p class="text-xs text-gray-500 mb-2">Founders with any selected tag will be silently blocked from matching with this investor.</p>
                <div class="max-h-48 overflow-y-auto border rounded p-2 grid grid-cols-2 gap-1">
                  <label v-for="cat in allExclusionCategories" :key="cat.id" class="flex items-center gap-2 text-sm hover:bg-gray-50 px-1 py-0.5 rounded cursor-pointer">
                    <input type="checkbox" :value="cat.id" v-model="investorForm.excludedCategoryIds" class="rounded">
                    <span>{{ cat.name }} <span class="text-xs text-gray-400">· {{ cat.type }}</span></span>

                </div>
              </div>
            </div>
          </div>
          <div class="flex justify-end space-x-3 mt-6">
            <button type="button" @click="closeInvestorModal" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Save</button>
          </div>
        </form>
      </div>

    <!-- Portfolio funding rounds / markup Modal -->
    <div v-if="showRoundsModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-2xl max-h-[88vh] overflow-auto">
        <div class="flex items-start justify-between mb-3">
          <div>
            <h3 class="text-lg font-semibold">Funding rounds — {{ roundsCompanyName }}</h3>
            <p class="text-xs text-gray-500 mt-0.5">Log each time an investor invests at a valuation. The latest valuation drives the markup; set an entry valuation on the company (Edit) for the baseline.</p>
          </div>
          <button @click="showRoundsModal=false" class="text-gray-400 hover:text-gray-600">✕</button>
        </div>
        <div class="flex gap-8 mb-4 text-sm">
          <div><div class="text-gray-400 text-xs uppercase">Entry val</div><div class="font-medium">{{ formatCurrency(roundsCompany.entryValuation || 3000000) }}<span v-if="!roundsCompany.entryValuation" class="text-gray-400 text-xs"> base</span></div></div>
          <div><div class="text-gray-400 text-xs uppercase">Current val</div><div class="font-medium">{{ formatCurrency(roundsCompany.currentValuation || 3000000) }}</div></div>
          <div><div class="text-gray-400 text-xs uppercase">Markup</div><div class="font-bold text-lg" :class="markupClass(roundsCompany)">{{ markupLabel(roundsCompany) }}</div></div>
        </div>
        <div class="bg-gray-50 rounded-lg p-3 mb-4 grid grid-cols-2 gap-2">
          <input v-model="roundForm.investorName" placeholder="Investor (lead)" class="border rounded px-2 py-1.5 text-sm">
          <input v-model="roundForm.roundName" placeholder="Round (e.g. Seed)" class="border rounded px-2 py-1.5 text-sm">
          <input v-model.number="roundForm.valuation" type="number" placeholder="Post-money valuation ($)" class="border rounded px-2 py-1.5 text-sm">
          <input v-model.number="roundForm.amountInvested" type="number" placeholder="Amount invested ($, optional)" class="border rounded px-2 py-1.5 text-sm">
          <input v-model="roundForm.roundDate" type="date" class="border rounded px-2 py-1.5 text-sm">
          <button @click="addRound" :disabled="addingRound || !roundForm.valuation" class="bg-green-600 text-white rounded px-3 py-1.5 text-sm hover:bg-green-700 disabled:opacity-50">{{ addingRound ? 'Saving…' : 'Add round' }}</button>
        </div>
        <div v-if="roundsErr" class="text-sm text-red-600 mb-2">{{ roundsErr }}</div>
        <div v-if="roundsLoading" class="text-sm text-gray-500 py-4 text-center">Loading…</div>
        <div v-else-if="rounds.length === 0" class="text-sm text-gray-500 py-4 text-center">No rounds logged yet.</div>
        <table v-else class="w-full text-sm">
          <thead><tr class="text-left text-gray-500 text-xs"><th class="py-1">Date</th><th>Round</th><th>Investor</th><th>Amount</th><th>Valuation</th><th></th></tr></thead>
          <tbody>
            <tr v-for="r in rounds" :key="r.id" class="border-t">
              <td class="py-1.5">{{ r.roundDate || '-' }}</td>
              <td>{{ r.roundName || '-' }}</td>
              <td>{{ r.investorName || '-' }}</td>
              <td>{{ r.amountInvested ? formatCurrency(r.amountInvested) : '-' }}</td>
              <td class="font-medium">{{ formatCurrency(r.valuation) || '-' }}</td>
              <td class="text-right"><button @click="deleteRound(r.id)" class="text-red-500 hover:underline text-xs">delete</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Send intro requests (after starting a trial) Modal -->
    <div v-if="showIntroSelect" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-lg max-h-[85vh] overflow-auto">
        <h3 class="text-lg font-semibold mb-1">Send intro requests<span v-if="introSelectFounderName"> for {{ introSelectFounderName }}</span></h3>
        <p class="text-xs text-gray-500 mb-4">Matched investors for this founder, best first. Uncheck any you don't want, then send.</p>
        <div v-if="introSelectLoading" class="text-sm text-gray-500 py-8 text-center">Finding matches…</div>
        <div v-else-if="introCandidates.length === 0" class="text-sm text-gray-500 py-8 text-center">No matches available right now — you can generate intros later from the pipeline.</div>
        <div v-else class="space-y-1 mb-4">
          <label class="flex items-center gap-2 text-xs text-gray-500 pb-2 border-b mb-1">
            <input type="checkbox" :checked="introCandidates.every(c => c.selected)" @change="introCandidates.forEach(c => c.selected = $event.target.checked)">
            Select all ({{ introCandidates.length }})
          </label>
          <label v-for="c in introCandidates" :key="c.introRequestId" class="flex items-center gap-2 px-2 py-1.5 rounded hover:bg-gray-50 cursor-pointer">
            <input type="checkbox" v-model="c.selected">
            <span class="text-sm flex-1 min-w-0">{{ c.investorName }}<span v-if="c.firm" class="text-gray-500"> · {{ c.firm }}</span></span>
            <span class="text-xs text-gray-400 flex-shrink-0">score {{ c.matchScore }}</span>
          </label>
        </div>
        <div class="flex justify-end gap-2 items-center">
          <span v-if="introSelectErr" class="text-sm text-red-600 mr-auto">{{ introSelectErr }}</span>
          <button @click="showIntroSelect = false" class="px-4 py-2 text-gray-600 hover:text-gray-800 text-sm">Later</button>
          <button @click="sendSelectedIntros" :disabled="introSelectSending || introCandidates.filter(c => c.selected).length === 0"
            class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 text-sm disabled:opacity-50 disabled:cursor-not-allowed">
            {{ introSelectSending ? 'Sending…' : 'Send ' + introCandidates.filter(c => c.selected).length + ' intro request' + (introCandidates.filter(c => c.selected).length === 1 ? '' : 's') }}
          </button>
        </div>
      </div>
    </div>

    <!-- Hand-off-to-partner Modal -->
    <div v-if="showHandoffModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md">
        <h3 class="text-lg font-semibold mb-1">Hand off to another partner</h3>
        <p class="text-xs text-gray-500 mb-4">Reassign this intro to a colleague at <b>{{ handoffFirm || 'the firm' }}</b> who's taking the meeting. Keeps the Gmail thread + history, recorded as handed off from <b>{{ handoffFromName }}</b>.</p>
        <label class="block text-sm font-medium mb-1">Partner name *</label>
        <input v-model="handoffName" type="text" placeholder="e.g. Dana Lewis" class="w-full border rounded px-3 py-2 text-sm mb-2">
        <div class="flex gap-2 mb-2">
          <input v-model="handoffEmail" type="email" placeholder="email (optional)" class="flex-1 border rounded px-3 py-2 text-sm">
          <input v-model="handoffRole" type="text" placeholder="role (optional)" class="flex-1 border rounded px-3 py-2 text-sm">
        </div>
        <label class="block text-sm font-medium mb-1">New status (optional)</label>
        <select v-model="handoffStatus" class="w-full border rounded px-3 py-2 text-sm mb-4">
          <option value="">Keep current status</option>
          <option v-for="s in introStatuses" :key="s" :value="s">{{ s.replace(/_/g, ' ') }}</option>
        </select>
        <div class="flex justify-end gap-2">
          <button @click="showHandoffModal=false" class="px-4 py-2 text-gray-600 hover:text-gray-800 text-sm">Cancel</button>
          <button @click="submitHandoff" :disabled="handoffSubmitting || !handoffName.trim()" class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700 text-sm disabled:opacity-50 disabled:cursor-not-allowed">{{ handoffSubmitting ? 'Saving…' : 'Hand off' }}</button>
        </div>
        <div v-if="handoffErr" class="text-sm text-red-600 mt-2">{{ handoffErr }}</div>
      </div>
    </div>

    <!-- Reject Reason Modal -->
    <div v-if="showRejectModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md">
        <h3 class="text-lg font-semibold mb-1">Why reject this intro?</h3>
        <p class="text-xs text-gray-500 mb-4">Captured for pattern-spotting later. Required.</p>
        <div class="space-y-1 mb-4">
          <label v-for="opt in rejectReasonOptions" :key="opt.label" class="flex items-start gap-2 cursor-pointer hover:bg-gray-50 px-2 py-1 rounded">
            <input type="radio" v-model="rejectReasonChoice" :value="opt" class="mt-1 rounded">
            <span class="text-sm">{{ opt.label }}<span v-if="opt.hint" class="text-xs text-gray-400"> — {{ opt.hint }}</span></span>
          </label>
        </div>
        <div v-if="rejectReasonChoice && rejectReasonChoice.category === 'other'" class="mb-4">
          <input type="text" v-model="rejectReasonOther" placeholder="Brief reason..." class="w-full border rounded px-3 py-2 text-sm" autofocus>
        </div>
        <div class="flex justify-end gap-2">
          <button @click="showRejectModal = false" class="px-4 py-2 text-gray-600 hover:text-gray-800 text-sm">Cancel</button>
          <button @click="submitRejectSuggestion" :disabled="!rejectReasonChoice" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 text-sm disabled:opacity-50 disabled:cursor-not-allowed">Reject</button>
        </div>
      </div>
    </div>

    <!-- Intro Request Modal -->
    <div v-if="showIntroModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-lg">
        <h3 class="text-lg font-semibold mb-4">{{ editingIntro ? 'Update' : 'New' }} Intro Request</h3>
        <form @submit.prevent="saveIntro">
          <div class="space-y-4">
            <div v-if="!editingIntro" class="grid grid-cols-3 gap-4">
              <div class="relative">
                <label class="block text-sm font-medium text-gray-700 mb-1">Founder</label>
                <input
                  v-model="introFounderSearch"
                  @focus="introFounderDropdownOpen = true"
                  @blur="blurIntroFounder"
                  type="text"
                  :placeholder="introForm.founderId ? founders.find(f => f.id == introForm.founderId)?.name : 'Type to search...'"
                  :class="['w-full border rounded px-3 py-2', introForm.founderId ? 'border-green-500 bg-green-50' : '']"
                />
                <div v-if="introFounderDropdownOpen && introFounderOptions.length" class="absolute z-10 w-full mt-1 bg-white border rounded shadow-lg max-h-48 overflow-y-auto">
                  <div
                    v-for="f in introFounderOptions"
                    :key="f.id"
                    @mousedown="introForm.founderId = f.id; introFounderSearch = f.name; introFounderDropdownOpen = false"
                    class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm"
                  >
                    <span class="font-medium">{{ f.name }}</span>
                    <span class="text-gray-500 ml-1">{{ f.companyName }}</span>
                  </div>
                </div>
              </div>
              <div class="relative">
                <label class="block text-sm font-medium text-gray-700 mb-1">Node</label>
                <input
                  v-model="introNodeSearch"
                  @focus="introNodeDropdownOpen = true"
                  @blur="blurIntroNode"
                  type="text"
                  :placeholder="introForm.nodeId ? nodes.find(n => n.id == introForm.nodeId)?.name : 'Type to search...'"
                  :class="['w-full border rounded px-3 py-2', introForm.nodeId ? 'border-green-500 bg-green-50' : '']"
                />
                <div v-if="introNodeDropdownOpen && introNodeOptions.length" class="absolute z-10 w-full mt-1 bg-white border rounded shadow-lg max-h-48 overflow-y-auto">
                  <div
                    v-for="n in introNodeOptions"
                    :key="n.id"
                    @mousedown="introForm.nodeId = n.id; introNodeSearch = n.name; introNodeDropdownOpen = false"
                    class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm"
                  >
                    <span class="font-medium">{{ n.name }}</span>
                    <span v-if="n.company" class="text-gray-500 ml-1">{{ n.company }}</span>
                  </div>
                </div>
              </div>
              <div class="relative">
                <label class="block text-sm font-medium text-gray-700 mb-1">Investor</label>
                <input
                  v-model="introInvestorSearch"
                  @focus="introInvestorDropdownOpen = true"
                  @blur="blurIntroInvestor"
                  type="text"
                  :placeholder="introForm.investorId ? investors.find(i => i.id == introForm.investorId)?.name : 'Type to search...'"
                  :class="['w-full border rounded px-3 py-2', introForm.investorId ? 'border-green-500 bg-green-50' : '']"
                />
                <div v-if="introInvestorDropdownOpen && introInvestorOptions.length" class="absolute z-10 w-full mt-1 bg-white border rounded shadow-lg max-h-48 overflow-y-auto">
                  <div
                    v-for="i in introInvestorOptions"
                    :key="i.id"
                    @mousedown="introForm.investorId = i.id; introInvestorSearch = i.name; introInvestorDropdownOpen = false"
                    class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm"
                  >
                    <span class="font-medium">{{ i.name }}</span>
                    <span class="text-gray-500 ml-1">@ {{ i.firm }}</span>
                  </div>
                </div>
              </div>
            </div>
            <div v-else class="p-3 bg-gray-50 rounded text-sm">
              <strong>{{ introForm.founderName }}</strong> → {{ introForm.nodeName }} → {{ introForm.investorName }}
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
              <select v-model="introForm.status" class="w-full border rounded px-3 py-2">
                <option v-for="status in introStatuses" :key="status" :value="status">{{ formatStatus(status) }}</option>
              </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Date Requested</label>
                <input v-model="introForm.dateRequested" type="date" class="w-full border rounded px-3 py-2">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Date Node Asked</label>
                <input v-model="introForm.dateNodeAsked" type="date" class="w-full border rounded px-3 py-2">
              </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Date Introduced</label>
                <input v-model="introForm.dateIntroduced" type="date" class="w-full border rounded px-3 py-2">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">First Meeting Date</label>
                <input v-model="introForm.firstMeetingDate" type="date" class="w-full border rounded px-3 py-2">
              </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Next Follow-up Date</label>
                <input v-model="introForm.nextFollowupDate" type="date" class="w-full border rounded px-3 py-2">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Follow-up Owner</label>
                <select v-model="introForm.followupOwner" class="w-full border rounded px-3 py-2">
                  <option value="founder">Founder</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
            </div>
            <div v-if="introForm.status === 'passed'">
              <label class="block text-sm font-medium text-gray-700 mb-1">Pass Reason</label>
              <input v-model="introForm.passReason" type="text" class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
              <textarea v-model="introForm.notes" rows="3" class="w-full border rounded px-3 py-2"></textarea>
            </div>
            <div v-if="!editingIntro" class="flex items-center space-x-2">
              <input type="checkbox" id="skipFirmDedup" v-model="introForm.skipFirmDedup" class="rounded border-gray-300">
              <label for="skipFirmDedup" class="text-sm text-gray-600">Skip firm-level duplicate check</label>
            </div>
          </div>
          <div class="flex justify-end space-x-3 mt-6">
            <button type="button" @click="closeIntroModal" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Save</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Followup Log Modal -->
    <div v-if="showFollowupModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md">
        <h3 class="text-lg font-semibold mb-4">Log Follow-up Activity</h3>
        <form @submit.prevent="saveFollowup">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>

          const out = { founder: 0, public_user: 0, founder_lead: 0 };

              if (s === 'founder') out.founder++;
              else if (s === 'public_user') out.public_user++;
              else if (s === 'founder_lead') out.founder_lead++;
            }
          }
          return out;

          for (const row of directoryRows.value) {
            if (row.sources.some(s => s.startsWith('capture:'))) n++;
          }
          return n;
        });

        const hasDirectoryFilters = computed(() => {
          return !!(directorySearch.value || directorySourceFilter.value.size > 0 || directoryTagFilter.value);
        });

        const filteredDirectoryRows = computed(() => {
          const q = directorySearch.value.trim().toLowerCase();
          const sf = directorySourceFilter.value;
          const tf = directoryTagFilter.value;
          return directoryRows.value.filter(row => {
            if (q) {
              const hay = [row.name, row.email, row.company, row.city].filter(Boolean).join(' ').toLowerCase();
              if (!hay.includes(q)) return false;
            }
            if (sf.size > 0) {
              const match = row.sources.some(s => {
                if (sf.has('capture')) return s.startsWith('capture:') || sf.has(s);
                return sf.has(s);
              });
              if (!match) return false;
            }
            if (tf && !row.tags.includes(tf)) return false;
            return true;
          });

        function toggleDirectorySource(value) {
          const next = new Set(directorySourceFilter.value);
          if (next.has(value)) next.delete(value);
          else next.add(value);

          directorySourceFilter.value = new Set();
          directoryTagFilter.value = null;

          if (source === 'founder') return 'Founder';
          if (source === 'public_user') return 'Signup';
          if (source === 'founder_lead') return 'Lead';
          if (source.startsWith('capture:')) return 'Capture: ' + source.slice(8);
          return source;
        }

        function directorySourceBadgeClass(source) {
          if (source === 'founder') return 'bg-emerald-100 text-emerald-700';
          if (source === 'public_user') return 'bg-blue-100 text-blue-700';
          if (source === 'founder_lead') return 'bg-purple-100 text-purple-700';
          if (source.startsWith('capture:')) return 'bg-amber-100 text-amber-700';
          return 'bg-gray-100 text-gray-700';
        }

        function directoryFormatRelative(iso) {
          if (!iso) return '—';
          const t = new Date(iso).getTime();
          if (isNaN(t)) return iso;
          const diff = Date.now() - t;
          const days = Math.floor(diff / 86400000);
          if (days < 1) return 'today';
          if (days < 2) return 'yesterday';
          if (days < 30) return days + 'd ago';
          if (days < 365) return Math.floor(days / 30) + 'mo ago';
          return Math.floor(days / 365) + 'y ago';
        }

              name: directoryEdit.value.name || null,
              city: directoryEdit.value.city || null,

            const dataUrl = await window.htmlToImage.toPng(tradingCardEl.value, {

        // Set of founder ids who have at least one portfolio company
        const portfolioFounderIds = computed(() => {

        // Computed: filtered founders (hide hidden unless toggled, plus active/portfolio filter)
        const filteredFounders = computed(() => {

        const hiddenFounderCount = computed(() => {

        // Computed: filtered options for intro form autocomplete
        const introFounderOptions = computed(() => {
          const search = introFounderSearch.value.toLowerCase().trim();
          if (!search) return founders.value.slice(0, 10);

            .filter(f => f.name.toLowerCase().includes(search) || f.companyName?.toLowerCase().includes(search))

        const introNodeOptions = computed(() => {
          const search = introNodeSearch.value.toLowerCase().trim();

        const introInvestorOptions = computed(() => {

            .filter(i => i.name.toLowerCase().includes(search) || i.firm?.toLowerCase().includes(search))

        });

        // Computed: investors filtered and sorted for intro planning
        // Count of stale (≥3w) investors among the per-founder match list — used
        // to surface a quick "X stale fits" hint above the planning list.
        const plannedStaleFitCount = computed(() => {
          if (!planningFounderId.value) return 0;
          return plannedInvestors.value.filter(inv => (inv.weeksSinceContact ?? 0) >= 3).length;
        });

        const plannedInvestors = computed(() => {
          if (!planningFounderId.value) return [];

          const founderId = parseInt(planningFounderId.value);
          const founder = founders.value.find(f => f.id === founderId);
          if (!founder) return [];

          // Get existing intro requests for this founder
          const existingIntroInvestorIds = new Set(
            allIntroRequests.value
              .filter(ir => ir.founderId === founderId)
              .map(ir => ir.investorId)
          );

          // Get firms that already have intros with this founder (exclude other members)
          const existingIntroFirms = new Set(
            allIntroRequests.value
              .filter(ir => ir.founderId === founderId && ir.investor?.firm)
              .map(ir => ir.investor.firm.toLowerCase().trim())
          );

          // Calculate most recent intro request date for each investor (across all founders)
          const investorLastContactMap = new Map();
          for (const ir of allIntroRequests.value) {
            const requestDate = ir.dateRequested || ir.createdAt;
            if (requestDate) {
              const existing = investorLastContactMap.get(ir.investorId);
              if (!existing || requestDate > existing) {
                investorLastContactMap.set(ir.investorId, requestDate);
              }
            }
          }

          // Get founder's node relationships
          const founderNodeIds = new Set(
            fnRelationships.value
              .filter(r => r.founderId === founderId)
              .map(r => r.nodeId)
          );

          // Build sector matching data
          // Founder sector IDs + their parent IDs (for parent-child matching)
          const founderSectorCats = (founder.categories || []).filter(c => c.type === 'sector');
          const founderSectorIds = new Set(founderSectorCats.map(c => c.id));
          // Also collect parent IDs of founder sectors for upward matching
          const founderSectorParentIds = new Set();
          for (const cat of allCategories.value) {
            if (founderSectorIds.has(cat.id) && cat.parentId) {
              founderSectorParentIds.add(cat.parentId);
            }
          }
          // Collect child IDs of founder sectors for downward matching
          const founderSectorChildIds = new Set();
          for (const cat of allCategories.value) {
            if (cat.parentId && founderSectorIds.has(cat.parentId)) {
              founderSectorChildIds.add(cat.id);
            }
          }
          // Combined: founder sector IDs + parents + children (full family)
          const founderSectorFamily = new Set([...founderSectorIds, ...founderSectorParentIds, ...founderSectorChildIds]);

          // Build investor list with fit scoring
          const investorList = [];

          for (const inv of investors.value) {
            // Skip inactive investors
            if (inv.active === false) continue;

            // Skip if already has intro
            if (existingIntroInvestorIds.has(inv.id)) continue;

            // Skip if another member of the same firm already has intro
            if (inv.firm && existingIntroFirms.has(inv.firm.toLowerCase().trim())) continue;

            // Find node connections to this investor
            const nodeConnections = niConnections.value.filter(
              nc => nc.investorId === inv.id && founderNodeIds.has(nc.nodeId)
            );

            // Skip if no connection through founder's nodes
            if (nodeConnections.length === 0) continue;

            // Geography filter: if investor has a specific geography, founder must be in it
            const invGeo = (inv.geography || '').toLowerCase().trim();
            if (invGeo) {
              const founderCity = (founder.city || '').toLowerCase();
              const founderCountry = (founder.country || '').toLowerCase();
              // Skip if founder has no location or location doesn't match investor geo
              if (!founderCity && !founderCountry) continue;
              const geoMatch = founderCity.includes(invGeo) || invGeo.includes(founderCity) ||
                               founderCountry.includes(invGeo) || invGeo.includes(founderCountry);
              if (!geoMatch) continue;
            }

            // Sector filter: if both have sectors, at least one must overlap
            // Generalist investors match everything except hardtech defaults (Climate/Energy, HardTech/DeepTech, Defense/Government)
            const invSectors = (inv.categories || []).filter(c => c.type === 'sector');
            if (founderSectorIds.size > 0 && invSectors.length > 0) {
              const isGeneralist = invSectors.some(c => c.name.toLowerCase() === 'generalist');
              if (isGeneralist) {
                // Generalist: only exclude hardtech-type sectors
                const hardtechExclusions = ['climate / energy', 'hardtech / deeptech', 'defense / government'];
                const founderSectorNames = founderSectorCats.map(c => c.name.toLowerCase());
                // Also check parent names
                const founderParentNames = founderSectorCats
                  .map(c => { const parent = allCategories.value.find(p => p.id === c.parentId); return parent ? parent.name.toLowerCase() : null; })
                  .filter(Boolean);
                const allFounderNames = [...founderSectorNames, ...founderParentNames];
                const excludedByDefault = allFounderNames.some(n => hardtechExclusions.includes(n));
                if (excludedByDefault) continue;
              } else {
                const invSectorIds = new Set(invSectors.map(c => c.id));
                // Check if any investor sector is in the founder's sector family
                const hasOverlap = [...invSectorIds].some(id => founderSectorFamily.has(id));
                if (!hasOverlap) continue; // No sector match — skip this investor
              }
            }

            // Stage filter: if both investor and founder have stage categories, require overlap
            const invStages = (inv.categories || []).filter(c => c.type === 'stage');
            const founderStages = (founder.categories || []).filter(c => c.type === 'stage');
            if (invStages.length > 0 && founderStages.length > 0) {
              const invStageIds = new Set(invStages.map(c => c.id));
              const hasStageOverlap = founderStages.some(c => invStageIds.has(c.id));
              if (!hasStageOverlap) continue;
            }

            // Calculate fit score
            let score = 0;
            const fitReasons = [];

            // Strong connection bonus
            const strongConnection = nodeConnections.find(nc => nc.connectionStrength === 'strong');
            if (strongConnection) {
              score += 30;
              fitReasons.push('strong_connection');
            } else if (nodeConnections.find(nc => nc.connectionStrength === 'medium')) {
              score += 15;
            }

            // Stage match (check size vs founder stage)
            const checkSize = inv.checkSize || '';
            const stage = founder.companyStage;
            if ((stage === 'pre_seed' && (checkSize.includes('25K') || checkSize.includes('100K'))) ||
                (stage === 'seed' && (checkSize.includes('100K') || checkSize.includes('500K') || checkSize.includes('2M'))) ||
                (stage === 'series_a' && (checkSize.includes('2M') || checkSize.includes('5M')))) {
              score += 20;
              fitReasons.push('stage_match');
            }

            // === RESEARCH-BASED SCORING ===
            if (inv.research) {
              // Investment thesis stage matching (+25 points)
              if (inv.research.investmentThesis) {
                const thesis = inv.research.investmentThesis.toLowerCase();
                const stageKeywords = {
                  'pre_seed': ['pre-seed', 'preseed', 'pre seed', 'earliest', 'idea stage', 'day zero', 'day one', 'formation'],
                  'seed': ['seed', 'early stage', 'early-stage', 'first check', 'first institutional'],
                  'series_a': ['series a', 'series-a', 'growth', 'scaling', 'product-market fit'],
                  'series_b': ['series b', 'series-b', 'expansion', 'scale']
                };
                const founderStageKeywords = stageKeywords[stage] || [];
                if (founderStageKeywords.some(kw => thesis.includes(kw))) {
                  score += 25;
                  fitReasons.push('thesis_stage_match');
                }

                // Sector/focus matching from thesis (+20 points)
                const companyName = founder.companyName.toLowerCase();
                const sectorKeywords = ['saas', 'fintech', 'healthtech', 'health tech', 'ai', 'artificial intelligence',
                  'machine learning', 'developer', 'devtools', 'infrastructure', 'enterprise', 'consumer',
                  'marketplace', 'ecommerce', 'e-commerce', 'crypto', 'web3', 'blockchain', 'climate',
                  'sustainability', 'biotech', 'deeptech', 'hardware', 'robotics', 'edtech', 'proptech'];
                for (const sector of sectorKeywords) {
                  if (thesis.includes(sector) && companyName.includes(sector.split(' ')[0])) {
                    score += 20;
                    fitReasons.push('sector_match');
                    break;
                  }
                }
              }

              // Founder preferences match (+15 points)
              if (inv.research.founderPreferences) {
                const prefs = inv.research.founderPreferences.toLowerCase();
                // Check for technical founder preference
                if (prefs.includes('technical') || prefs.includes('engineer') || prefs.includes('product')) {
                  score += 15;
                  fitReasons.push('founder_pref');
                }
                // First-time founder friendly
                if (prefs.includes('first-time') || prefs.includes('first time') || prefs.includes('new founder') || prefs.includes('emerging')) {
                  score += 10;
                  fitReasons.push('first_time_friendly');
                }
                // Repeat founder preference (check founder history if available)
                if (prefs.includes('repeat') || prefs.includes('serial') || prefs.includes('experienced')) {
                  score += 5;
                }
              }

              // Recent activity bonus - actively deploying (+15 points)
              if (inv.research.recentActivity) {
                const activity = inv.research.recentActivity.toLowerCase();
                const recentTerms = ['2024', '2025', '2026', 'recently', 'just', 'new fund', 'actively investing', 'latest'];
                if (recentTerms.some(term => activity.includes(term))) {
                  score += 15;
                  fitReasons.push('active_investor');
                }
              }

              // Portfolio company diversity bonus (+10 points)
              // Having a diverse portfolio suggests they're open to different types of companies
              if (inv.research.portfolioCompanies) {
                try {
                  const portfolio = typeof inv.research.portfolioCompanies === 'string'
                    ? JSON.parse(inv.research.portfolioCompanies)
                    : inv.research.portfolioCompanies;
                  if (Array.isArray(portfolio) && portfolio.length >= 3) {
                    score += 10;
                    fitReasons.push('active_portfolio');
                  }
                } catch (e) {}
              }

              // Base research bonus (has data available)
              score += 5;
              fitReasons.push('has_research');
            }

            // === RECENCY BONUS ===
            // Investors not contacted recently get a boost (up to +30 points)
            const lastContact = investorLastContactMap.get(inv.id);
            let weeksSinceContact = 52; // Default to 1 year if never contacted
            if (lastContact) {
              const lastDate = new Date(lastContact);
              const now = new Date();
              const daysSince = Math.floor((now - lastDate) / (1000 * 60 * 60 * 24));
              weeksSinceContact = Math.floor(daysSince / 7);
            }
            // Scale: 0 weeks = 0 points, 6+ weeks = 30 points
            const recencyBonus = Math.min(30, weeksSinceContact * 5);
            score += recencyBonus;
            // "Stale" badge fires at 3+ weeks, matching the system-wide throughput threshold
            if (weeksSinceContact >= 3) {
              fitReasons.push('not_recent');
            }

            // Add randomization (0-20 points based on shuffle seed)
            const randomFactor = ((inv.id * shuffleSeed.value) % 20);
            score += randomFactor;

            // Get best node connection info
            const bestConnection = strongConnection || nodeConnections[0];
            const nodeName = nodes.value.find(n => n.id === bestConnection.nodeId)?.name || 'Unknown';

            // Get last 3 intro requests for this investor (across all founders)
            const recentIntros = allIntroRequests.value
              .filter(ir => ir.investorId === inv.id)
              .sort((a, b) => (b.dateRequested || b.createdAt || '').localeCompare(a.dateRequested || a.createdAt || ''))
              .slice(0, 3)
              .map(ir => ({
                id: ir.id,
                founderName: ir.founder?.name || 'Unknown',
                companyName: ir.founder?.companyName || '',
                status: ir.status,
                dateRequested: ir.dateRequested,
              }));

            investorList.push({
              ...inv,
              investor: inv,
              score,
              fitReasons,
              weeksSinceContact,
              recentIntros,
              nodeConnection: {
                nodeName,
                strength: bestConnection.connectionStrength,
              },
            });
          }

          // Apply search filter
          let filtered = investorList;
          if (investorSearchQuery.value) {
            const q = investorSearchQuery.value.toLowerCase();
            filtered = filtered.filter(inv => {
              const name = (inv.name || '').toLowerCase();
              const firm = (inv.firm || '').toLowerCase();
              return name.includes(q) || firm.includes(q);
            });
          }

          // Apply node filter

            const nodeId = parseInt(filterByNodeId.value);

              niConnections.value
                .filter(nc => nc.nodeId === nodeId)

          if (planningFilterExactSector.value && founderSectorIds.size > 0) {
            filtered = filtered.filter(inv => {
              const invSectors = (inv.categories || []).filter(c => c.type === 'sector');
              if (invSectors.length === 0) return false; // no sectors = skip
              const isGeneralist = invSectors.some(c => c.name.toLowerCase() === 'generalist');
              if (isGeneralist) return false; // generalist = skip
              const invSectorIds = new Set(invSectors.map(c => c.id));
              return [...invSectorIds].some(id => founderSectorFamily.has(id));
            });
          }

          // Apply stale filter if enabled (3+ weeks since contact, matching
          // the system-wide throughput threshold)
          if (planningFilterStale.value) {
            filtered = filtered.filter(inv => inv.weeksSinceContact >= 3);
            // Sort by weeks since contact descending (oldest first)
            return filtered.sort((a, b) => b.weeksSinceContact - a.weeksSinceContact);
          }

          // Default: sort by score descending
          return filtered.sort((a, b) => b.score - a.score);

              niConnections.value
                .filter(nc => nc.nodeId === nodeId)
                .map(nc => nc.investorId)
            );
            results = results.filter(inv => nodeInvestorIds.has(inv.id));
          }

          // Filter by category
          if (filterByCategoryId.value) {
            const catId = parseInt(filterByCategoryId.value);
            results = results.filter(inv => (inv.categories || []).some(c => c.id === catId));
          }

          // Filter by country
          if (filterByCountry.value) {
            results = results.filter(inv => inv.country === filterByCountry.value);
          }

          // Filter by US state
          if (filterByState.value) {
            results = results.filter(inv => inv.state === filterByState.value);

          // Filter by search query
          if (investorSearchQuery.value) {
            const q = investorSearchQuery.value.toLowerCase();
            results = results.filter(inv => {
              if (inv.name?.toLowerCase().includes(q)) return true;
              if (inv.firm?.toLowerCase().includes(q)) return true;
              if (inv.research?.investmentThesis?.toLowerCase().includes(q)) return true;
              if (inv.research?.founderPreferences?.toLowerCase().includes(q)) return true;
              if (inv.research?.portfolioCompanies?.toLowerCase().includes(q)) return true;
              return false;
            });
          }

          // Sort. Leaderboard modes apply a min-intros floor so a single
          // 100%-accept intro doesn't dominate the rankings (recency bias).
          if (investorSortBy.value === 'accept-rate') {
            const min = Math.max(0, parseInt(investorMinIntros.value) || 0);
            results = results
              .filter(inv => (inv.introTotal || 0) >= min)
              .slice()
              .sort((a, b) => {
                const rateDiff = (b.acceptRate || 0) - (a.acceptRate || 0);
                if (rateDiff !== 0) return rateDiff;
                return (b.introTotal || 0) - (a.introTotal || 0);
              });
          } else if (investorSortBy.value === 'intro-volume') {
            const min = Math.max(0, parseInt(investorMinIntros.value) || 0);
            results = results
              .filter(inv => (inv.introTotal || 0) >= min)
              .slice()
              .sort((a, b) => (b.introTotal || 0) - (a.introTotal || 0));
          } else if (investorSortBy.value === 'last-engaged') {
            // Re-engagement view: oldest last-engaged first, never-engaged at the
            // very top. No min-intros floor — never-contacted investors are exactly
            // who we want to surface. lastIntroAt = most recent intro we sent them.
            results = results
              .slice()
              .sort((a, b) => {
                const ta = a.lastIntroAt ? new Date(a.lastIntroAt).getTime() : -Infinity;
                const tb = b.lastIntroAt ? new Date(b.lastIntroAt).getTime() : -Infinity;
                return ta - tb;

          return results;

        // Every portfolio company is assumed to start at $3M post-money — our base

        // Export the portfolio (with markup math) to a CSV the cofounder can open

        const exportPortfolioCsv = () => {
          const cos = (portfolio.value && portfolio.value.companies) || [];
          if (!cos.length) return;
          const esc = (v) => {
            const s = v == null ? '' : String(v);
            return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
          };
          const cols = ['Company', 'One-liner', 'Investment Date', 'Equity %',
            'Entry Valuation', 'Current Valuation', 'Markup', 'Paper Value', 'Equity Agreement Signed'];
          const rows = cos.map((co) => {
            const entry = co.entryValuation || DEFAULT_ENTRY_VAL;
            const current = co.currentValuation || DEFAULT_ENTRY_VAL;
            const m = current / entry;
            const eq = parseFloat(co.equityPercent || '0') / 100;
            return [
              co.founder?.companyName || '',
              co.oneLiner || '',
              co.investmentDate || '',
              co.equityPercent ? co.equityPercent + '%' : '',
              entry,
              current,
              (m >= 10 ? m.toFixed(0) : m.toFixed(1)) + 'x',
              eq ? Math.round(current * eq) : '',
              co.equitySigned ? 'Yes' : 'No',
            ];
          });
          const totalPaper = cos.reduce((sum, co) => {
            const current = co.currentValuation || DEFAULT_ENTRY_VAL;
            const eq = parseFloat(co.equityPercent || '0') / 100;
            return sum + (eq ? current * eq : 0);
          }, 0);
          rows.push(['', '', '', '', '', '', 'Total paper value', Math.round(totalPaper), '']);
          const csv = [cols, ...rows].map((r) => r.map(esc).join(',')).join('\n');

          const founderEmail = f.email || '';
          const investorEmail = i.email || '';

          else if (healthFilter.value === 'active') investors = investors.filter(i => !i.isDormant && i.active);

          const sorted = [...investors];
          const dir = healthSort.dir === 'asc' ? 1 : -1;
          sorted.sort((a, b) => {
            switch (healthSort.key) {
              case 'name': return dir * a.name.localeCompare(b.name);
              case 'intros': return dir * (a.totalIntros - b.totalIntros);
              case 'response': return dir * (a.responseRate - b.responseRate);
              case 'meetings': return dir * (a.meetings - b.meetings);
              case 'status': {

          });

        const trendPoints = computed(() => {

        // paper value and computes a paper TVPI = current paper value / entry
        // paper value (entry valuation x equity %). No distributions yet, so
        // TVPI here is the portfolio's mark-to-entry multiple.
        const portfolioStats = () => {
          const cos = (portfolio.value.companies || []).filter(c => {
            const inBasis = portfolioValueBasis.value === 'equity' ? c.equitySigned : c.advisorySigned;
            if (!inBasis) return false;

          let paper = 0;
          let entry = 0;
          const positions = [];
          for (const co of cos) {
            const pv = calculatePaperValue(co); // current paper value, or null

              paper += pv;
              const eq = parseFloat(co.equityPercent) / 100;

          return {
            count: cos.length,
            paper: Math.round(paper),
            tvpi: entry > 0 ? paper / entry : null,
            topName: top ? top.name : null,
            topShare: (top && paper > 0) ? top.value / paper : null,
